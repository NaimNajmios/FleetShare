        <style>
            :root {
                --primary-color: #4B49AC;
                --secondary-color: #7978E9;
                --text-dark: #2C3E50;
                --text-muted: #6c757d;
                --bg-light: #F4F7FA;
                --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
                --hover-shadow: 0 15px 35px rgba(75, 73, 172, 0.1);
            }

            body {
                background-color: var(--bg-light);
            }

            /* Layout Grid */
            .browse-container {
                display: grid;
                grid-template-columns: 280px 1fr;
                gap: 2.5rem;
                padding: 2rem 0;
                align-items: start;
            }

            /* Floating Sidebar */
            .filter-sidebar {
                background: white;
                border-radius: 20px;
                padding: 2rem;
                box-shadow: var(--card-shadow);
                border: 1px solid rgba(0, 0, 0, 0.02);
                height: min-content;
            }

            @media (min-width: 992px) {
                .filter-sidebar {
                    position: sticky;
                    top: 100px;
                }
            }

            .sidebar-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid #f0f0f0;
            }

            .sidebar-title {
                font-size: 1.2rem;
                font-weight: 700;
                color: var(--text-dark);
                margin: 0;
            }

            .clear-filters {
                font-size: 0.85rem;
                color: #dc3545;
                text-decoration: none;
                font-weight: 500;
                transition: opacity 0.2s;
            }

            .clear-filters:hover {
                opacity: 0.8;
                text-decoration: none;
                color: #dc3545;
            }

            .filter-group {
                margin-bottom: 2rem;
            }

            .filter-group-title {
                font-size: 0.95rem;
                font-weight: 700;
                margin-bottom: 1rem;
                color: var(--text-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* Custom Checkboxes */
            .custom-checkbox {
                display: flex;
                align-items: center;
                margin-bottom: 0.8rem;
                cursor: pointer;
                font-size: 0.95rem;
                color: var(--text-muted);
                transition: color 0.2s;
            }

            .custom-checkbox:hover {
                color: var(--primary-color);
            }

            .custom-checkbox input {
                margin-right: 0.8rem;
                width: 18px;
                height: 18px;
                accent-color: var(--primary-color);
                cursor: pointer;
            }

            /* Price Range Inputs */
            .price-inputs {
                display: flex;
                gap: 0.8rem;
                align-items: center;
            }

            .price-input {
                padding: 0.6rem 0.5rem;
                border: 1px solid #e0e0e0;
                font-size: 0.9rem;
                background: #f8f9fa;
                transition: all 0.3s ease;
            }

            .price-filter-group .input-group-text {
                border-top-left-radius: 10px;
                border-bottom-left-radius: 10px;
                border: 1px solid #e0e0e0;
            }

            .price-filter-group .form-control {
                border-top-right-radius: 10px;
                border-bottom-right-radius: 10px;
            }

            .price-input:focus {
                border-color: var(--primary-color);
                background: white;
                outline: none;
                box-shadow: 0 0 0 3px rgba(75, 73, 172, 0.1);
            }

            /* Main Content Header */
            .main-content-header {
                margin-bottom: 2rem;
            }

            .search-bar-large {
                width: 100%;
                padding: 1.2rem 3.5rem 1.2rem 3.5rem;
                border: none;
                border-radius: 20px;
                background: white;
                box-shadow: var(--card-shadow);
                font-size: 1.05rem;
                color: var(--text-dark);
                transition: all 0.3s ease;
            }

            .search-icon {
                position: absolute;
                left: 1.2rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 1.2rem;
                pointer-events: none;
                z-index: 5;
            }

            .search-bar-large:focus {
                outline: none;
                box-shadow: var(--hover-shadow);
                transform: translateY(-2px);
            }

            /* Vehicle Grid */
            .vehicle-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 2rem;
            }

            @media (max-width: 576px) {
                .vehicle-grid {
                    grid-template-columns: 1fr;
                    gap: 1.25rem;
                }
            }

            /* Vehicle Card */
            .vehicle-card {
                background: white;
                border-radius: 20px;
                overflow: hidden;
                box-shadow: var(--card-shadow);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border: 1px solid rgba(0, 0, 0, 0.02);
                position: relative;
                display: flex;
                flex-direction: column;
            }

            .vehicle-card:hover {
                transform: translateY(-8px);
                box-shadow: var(--hover-shadow);
            }

            .vehicle-image-container {
                height: 220px;
                position: relative;
                overflow: hidden;
            }

            .vehicle-image-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }

            .vehicle-card:hover .vehicle-image-container img {
                transform: scale(1.05);
            }

            .price-badge {
                position: absolute;
                top: 1rem;
                right: 1rem;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(5px);
                padding: 0.5rem 1rem;
                border-radius: 50px;
                font-weight: 700;
                color: var(--primary-color);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                font-size: 0.95rem;
                z-index: 2;
            }

            .vehicle-placeholder-icon {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f8f9fa;
                color: #dee2e6;
                font-size: 4rem;
            }

            .vehicle-details {
                padding: 1.5rem;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
            }

            .vehicle-title {
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--text-dark);
                margin-bottom: 0.5rem;
                line-height: 1.4;
            }

            .owner-info {
                display: flex;
                align-items: center;
                margin-bottom: 1rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid #f0f0f0;
            }

            .owner-avatar {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: #e9ecef;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-right: 0.5rem;
                color: var(--text-muted);
                font-size: 0.7rem;
            }

            .vehicle-specs {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
                margin-bottom: 1.5rem;
            }

            .spec-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                font-size: 0.85rem;
                color: var(--text-muted);
                background: #f8f9fa;
                padding: 0.8rem 0.5rem;
                border-radius: 12px;
            }

            .spec-icon {
                font-size: 1.1rem;
                margin-bottom: 0.4rem;
            }

            .location-info {
                font-size: 0.9rem;
                color: var(--text-muted);
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
            }

            .book-now-btn {
                width: 100%;
                padding: 1rem;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 12px;
                font-weight: 600;
                font-size: 1rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: auto;
                text-align: center;
                text-decoration: none;
                display: block;
            }

            .book-now-btn:hover {
                background: #3f3e91;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(75, 73, 172, 0.3);
                color: white;
                text-decoration: none;
            }

            /* Responsive */
            @media (max-width: 991px) {
                .browse-container {
                    grid-template-columns: 1fr;
                    gap: 1.5rem;
                    padding: 1rem 1rem; /* horizontal breathing room */
                }

                /* Fix filter sidebar visibility ΓÇö must NOT be transparent on mobile */
                .filter-sidebar {
                    background: white !important;
                    border-radius: 0 !important;
                    padding: 0 !important;
                    box-shadow: none !important;
                    border: none !important;
                }

                /* Offcanvas-specific styling when open */
                .offcanvas-body {
                    padding: 1.5rem;
                }

                .vehicle-image-container {
                    height: 200px;
                }

                /* Mobile touch targets */
                .custom-checkbox {
                    min-height: 44px;
                    padding: 0.5rem 0;
                }

                .custom-checkbox input {
                    width: 20px;
                    height: 20px;
                    flex-shrink: 0;
                }

                .btn-search-dates {
                    padding: 0.75rem;
                    font-size: 0.9375rem;
                }

                .price-input {
                    padding: 0.75rem 0.5rem;
                    min-height: 44px;
                }
            }

            /* Quick View Button */
            .quick-view-btn {
                position: absolute;
                bottom: 1rem;
                right: 1rem;
                background: white;
                color: var(--text-dark);
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s ease;
                cursor: pointer;
                border: none;
                z-index: 3;
            }

            .vehicle-card:hover .quick-view-btn {
                opacity: 1;
                transform: translateY(0);
            }

            /* Always visible on touch devices or smaller screens */
            @media (hover: none), (max-width: 991px) {
                .quick-view-btn {
                    opacity: 1;
                    transform: translateY(0);
                    bottom: 0.5rem;
                    right: 0.5rem;
                    width: 44px;
                    height: 44px;
                    font-size: 1.125rem;
                }
            }

            .quick-view-btn:hover {
                background: var(--primary-color);
                color: white;
            }

            .quick-view-btn:focus {
                opacity: 1;
                transform: translateY(0);
                outline: 2px solid var(--primary-color);
            }

            /* Modal Gradient */
            .bg-gradient-dark {
                background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            }

            /* Sort Animation */
            .animate-fade-in {
                animation: fadeIn 0.4s ease-out forwards;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @media (prefers-reduced-motion: reduce) {
                .vehicle-card,
                .vehicle-card:hover,
                .vehicle-image-container img,
                .vehicle-card:hover .vehicle-image-container img,
                .search-bar-large:focus,
                .quick-view-btn,
                .animate-fade-in,
                .price-input {
                    transition: none;
                    animation: none;
                    transform: none;
                }
            }

            /* Redesigned Date Picker Styles */
            .date-filter-group {
                margin-bottom: 1rem;
            }

            .date-input-with-icon {
                position: relative;
            }

            .date-input-with-icon .form-control {
                padding-left: 2.5rem;
                border-radius: 10px;
                background: #f8f9fa;
                border: 1px solid #e0e0e0;
                font-size: 0.9rem;
                transition: all 0.3s ease;
            }

            .date-input-with-icon .form-control:focus {
                background: white;
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(75, 73, 172, 0.1);
            }

            .date-input-with-icon .date-icon {
                position: absolute;
                left: 0.75rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 0.9rem;
                z-index: 5;
                pointer-events: none;
            }

            .day-of-week-label {
                font-size: 0.7rem;
                color: var(--primary-color);
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 0.4rem;
                padding-left: 0.5rem;
                opacity: 0;
                transition: opacity 0.3s ease;
                min-height: 1.2em;
            }

            .day-of-week-label.visible {
                opacity: 1;
            }

            .date-connector {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0.25rem 0;
            }

            .date-connector .fas {
                color: #adb5bd;
                font-size: 0.85rem;
            }

            /* Quick Select Pills */
            .quick-select-pills {
                display: flex;
                gap: 0.4rem;
                margin-top: 0.75rem;
                flex-wrap: wrap;
            }

            .quick-select-pill {
                font-size: 0.75rem;
                padding: 0.35rem 0.65rem;
                border-radius: 50px;
                border: 1px solid #dee2e6;
                background: white;
                color: var(--text-muted);
                cursor: pointer;
                transition: all 0.2s ease;
                font-weight: 500;
            }

            .quick-select-pill:hover {
                background: #f8f9fa;
                border-color: var(--primary-color);
                color: var(--primary-color);
            }

            .quick-select-pill.active {
                background: #e8e8f4;
                border-color: var(--primary-color);
                color: var(--primary-color);
                font-weight: 600;
            }

            /* Search Button */
            .btn-search-dates {
                width: 100%;
                padding: 0.6rem;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 10px;
                font-weight: 600;
                font-size: 0.85rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 0.75rem;
            }

            .btn-search-dates:hover {
                background: #3f3e91;
                transform: translateY(-1px);
            }

            /* Location filter dropdown styles */
            #filterState, #filterCity {
                color: var(--text-dark, #212529);
            }
            #filterState option, #filterCity option {
                color: var(--text-dark, #212529);
                background: white;
            }

            /* Offcanvas spacing on small screens */
            @media (max-width: 480px) {
                .offcanvas-body {
                    padding: 1rem;
                }
            }

            @media (max-width: 360px) {
                .offcanvas-body {
                    padding: 0.75rem;
                }
                .vehicle-specs {
                    gap: 0.4rem;
                }
                .spec-item {
                    padding: 0.5rem 0.25rem;
                    font-size: 0.75rem;
                }
                .vehicle-title {
                    font-size: 1.1rem;
                }
            }

            /* --- PREMIUM MOBILE REDESIGN --- */
            @media (max-width: 768px) {
                /* Search pill layout */
                .main-content-header {
                    background: white;
                    padding: 0.4rem 0.4rem 0.4rem 0.75rem;
                    border-radius: 100px;

                }
                .search-bar-large {

                }

                }
                .search-icon {

                }
                .main-content-header .btn-primary {

                }
                .main-content-header .dropdown-toggle {

                }

                /* Results bar */
                .d-flex.justify-content-between.align-items-center.mb-4 h2 {

                }

                /* Vehicle Cards ΓÇö premium overrides */
                .vehicle-card {

                /* Hide visible button ΓÇö full card is the tap target */

            /* Tiny screen spec tweaks */
            @media (max-width: 400px) {
                .spec-item {

                }

                font-size: 1.2rem;
                font-weight: 700;
                color: var(--text-dark);
                margin: 0;
            }

            .clear-filters {
                font-size: 0.85rem;
                color: #dc3545;
                text-decoration: none;
                font-weight: 500;
                transition: opacity 0.2s;
            }

            .clear-filters:hover {
                opacity: 0.8;
                text-decoration: none;
                color: #dc3545;
            }

            .filter-group {
                margin-bottom: 2rem;
            }

            .filter-group-title {
                font-size: 0.95rem;
                font-weight: 700;
                margin-bottom: 1rem;
                color: var(--text-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* Custom Checkboxes */
            .custom-checkbox {
                display: flex;
                align-items: center;
                margin-bottom: 0.8rem;
                cursor: pointer;
                font-size: 0.95rem;
                color: var(--text-muted);
                transition: color 0.2s;
            }

            .custom-checkbox:hover {
                color: var(--primary-color);
            }

            .custom-checkbox input {
                margin-right: 0.8rem;
                width: 18px;
                height: 18px;
                accent-color: var(--primary-color);
                cursor: pointer;
            }

            /* Price Range Inputs */
            .price-inputs {
                display: flex;
                gap: 0.8rem;
                align-items: center;
            }

            .price-input {
                padding: 0.6rem 0.5rem;
                border: 1px solid #e0e0e0;
                font-size: 0.9rem;
                background: #f8f9fa;
                transition: all 0.3s ease;
            }

            .price-filter-group .input-group-text {
                border-top-left-radius: 10px;
                border-bottom-left-radius: 10px;
                border: 1px solid #e0e0e0;
            }

            .price-filter-group .form-control {
                border-top-right-radius: 10px;
                border-bottom-right-radius: 10px;
            }

            .price-input:focus {
                border-color: var(--primary-color);
                background: white;
                outline: none;
                box-shadow: 0 0 0 3px rgba(75, 73, 172, 0.1);
            }

            /* Main Content Header */
            .main-content-header {
                margin-bottom: 2rem;
            }

            .search-bar-large {
                width: 100%;
                padding: 1.2rem 3.5rem 1.2rem 3.5rem;
                border: none;
                border-radius: 20px;
                background: white;
                box-shadow: var(--card-shadow);
                font-size: 1.05rem;
                color: var(--text-dark);
                transition: all 0.3s ease;
            }

            .search-icon {
                position: absolute;
                left: 1.2rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 1.2rem;
                pointer-events: none;
                z-index: 5;
            }

            .search-bar-large:focus {
                outline: none;
                box-shadow: var(--hover-shadow);
                transform: translateY(-2px);
            }

            /* Vehicle Grid */
            .vehicle-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 2rem;
            }

            @media (max-width: 576px) {
                .vehicle-grid {
                    grid-template-columns: 1fr;
                    gap: 1.25rem;
                }
            }

            /* Vehicle Card */
            .vehicle-card {
                background: white;
                border-radius: 20px;
                overflow: hidden;
                box-shadow: var(--card-shadow);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border: 1px solid rgba(0, 0, 0, 0.02);
                position: relative;
                display: flex;
                flex-direction: column;
            }

            .vehicle-card:hover {
                transform: translateY(-8px);
                box-shadow: var(--hover-shadow);
            }

            .vehicle-image-container {
                height: 220px;
                position: relative;
                overflow: hidden;
            }

            .vehicle-image-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }

            .vehicle-card:hover .vehicle-image-container img {
                transform: scale(1.05);
            }

            .price-badge {
                position: absolute;
                top: 1rem;
                right: 1rem;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(5px);
                padding: 0.5rem 1rem;
                border-radius: 50px;
                font-weight: 700;
                color: var(--primary-color);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                font-size: 0.95rem;
                z-index: 2;
            }

            .vehicle-placeholder-icon {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f8f9fa;
                color: #dee2e6;
                font-size: 4rem;
            }

            .vehicle-details {
                padding: 1.5rem;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
            }

            .vehicle-title {
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--text-dark);
                margin-bottom: 0.5rem;
                line-height: 1.4;
            }

            .owner-info {
                display: flex;
                align-items: center;
                margin-bottom: 1rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid #f0f0f0;
            }

            .owner-avatar {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: #e9ecef;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-right: 0.5rem;
                color: var(--text-muted);
                font-size: 0.7rem;
            }

            .vehicle-specs {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
                margin-bottom: 1.5rem;
            }

            .spec-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                font-size: 0.85rem;
                color: var(--text-muted);
                background: #f8f9fa;
                padding: 0.8rem 0.5rem;
                border-radius: 12px;
            }

            .spec-icon {
                font-size: 1.1rem;
                margin-bottom: 0.4rem;
            }

            .location-info {
                font-size: 0.9rem;
                color: var(--text-muted);
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
            }

            .book-now-btn {
                width: 100%;
                padding: 1rem;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 12px;
                font-weight: 600;
                font-size: 1rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: auto;
                text-align: center;
                text-decoration: none;
                display: block;
            }

            .book-now-btn:hover {
                background: #3f3e91;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(75, 73, 172, 0.3);
                color: white;
                text-decoration: none;
            }

            /* Responsive */
            @media (max-width: 991px) {
                .browse-container {
                    grid-template-columns: 1fr;
                    gap: 1.5rem;
                    padding: 1rem 1rem; /* horizontal breathing room */
                }

                /* Fix filter sidebar visibility ΓÇö must NOT be transparent on mobile */
                .filter-sidebar {
                    background: white !important;
                    border-radius: 0 !important;
                    padding: 0 !important;
                    box-shadow: none !important;
                    border: none !important;
                }

                /* Offcanvas-specific styling when open */
                .offcanvas-body {
                    padding: 1.5rem;
                }

                .vehicle-image-container {
                    height: 200px;
                }

                /* Mobile touch targets */
                .custom-checkbox {
                    min-height: 44px;
                    padding: 0.5rem 0;
                }

                .custom-checkbox input {
                    width: 20px;
                    height: 20px;
                    flex-shrink: 0;
                }

                .btn-search-dates {
                    padding: 0.75rem;
                    font-size: 0.9375rem;
                }

                .price-input {
                    padding: 0.75rem 0.5rem;
                    min-height: 44px;
                }
            }

            /* Quick View Button */
            .quick-view-btn {
                position: absolute;
                bottom: 1rem;
                right: 1rem;
                background: white;
                color: var(--text-dark);
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s ease;
                cursor: pointer;
                border: none;
                z-index: 3;
            }

            .vehicle-card:hover .quick-view-btn {
                opacity: 1;
                transform: translateY(0);
            }

            /* Always visible on touch devices or smaller screens */
            @media (hover: none), (max-width: 991px) {
                .quick-view-btn {
                    opacity: 1;
                    transform: translateY(0);
                    bottom: 0.5rem;
                    right: 0.5rem;
                    width: 44px;
                    height: 44px;
                    font-size: 1.125rem;
                }
            }

            .quick-view-btn:hover {
                background: var(--primary-color);
                color: white;
            }

            .quick-view-btn:focus {
                opacity: 1;
                transform: translateY(0);
                outline: 2px solid var(--primary-color);
            }

            /* Modal Gradient */
            .bg-gradient-dark {
                background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            }

            /* Sort Animation */
            .animate-fade-in {
                animation: fadeIn 0.4s ease-out forwards;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @media (prefers-reduced-motion: reduce) {
                .vehicle-card,
                .vehicle-card:hover,
                .vehicle-image-container img,
                .vehicle-card:hover .vehicle-image-container img,
                .search-bar-large:focus,
                .quick-view-btn,
                .animate-fade-in,
                .price-input {
                    transition: none;
                    animation: none;
                    transform: none;
                }
            }

            /* Redesigned Date Picker Styles */
            .date-filter-group {
                margin-bottom: 1rem;
            }

            .date-input-with-icon {
                position: relative;
            }

            .date-input-with-icon .form-control {
                padding-left: 2.5rem;
                border-radius: 10px;
                background: #f8f9fa;
                border: 1px solid #e0e0e0;
                font-size: 0.9rem;
                transition: all 0.3s ease;
            }

            .date-input-with-icon .form-control:focus {
                background: white;
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(75, 73, 172, 0.1);
            }

            .date-input-with-icon .date-icon {
                position: absolute;
                left: 0.75rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 0.9rem;
                z-index: 5;
                pointer-events: none;
            }

            .day-of-week-label {
                font-size: 0.7rem;
                color: var(--primary-color);
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 0.4rem;
                padding-left: 0.5rem;
                opacity: 0;
                transition: opacity 0.3s ease;
                min-height: 1.2em;
            }

            .day-of-week-label.visible {
                opacity: 1;
            }

            .date-connector {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0.25rem 0;
            }

            .date-connector .fas {
                color: #adb5bd;
                font-size: 0.85rem;
            }

            /* Quick Select Pills */
            .quick-select-pills {
                display: flex;
                gap: 0.4rem;
                margin-top: 0.75rem;
                flex-wrap: wrap;
            }

            .quick-select-pill {
                font-size: 0.75rem;
                padding: 0.35rem 0.65rem;
                border-radius: 50px;
                border: 1px solid #dee2e6;
                background: white;
                color: var(--text-muted);
                cursor: pointer;
                transition: all 0.2s ease;
                font-weight: 500;
            }

            .quick-select-pill:hover {
                background: #f8f9fa;
                border-color: var(--primary-color);
                color: var(--primary-color);
            }

            .quick-select-pill.active {
                background: #e8e8f4;
                border-color: var(--primary-color);
                color: var(--primary-color);
                font-weight: 600;
            }

            /* Search Button */
            .btn-search-dates {
                width: 100%;
                padding: 0.6rem;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 10px;
                font-weight: 600;
                font-size: 0.85rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 0.75rem;
            }

            .btn-search-dates:hover {
                background: #3f3e91;
                transform: translateY(-1px);
            }

            /* Location filter dropdown styles */
            #filterState, #filterCity {
                color: var(--text-dark, #212529);
            }
            #filterState option, #filterCity option {
                color: var(--text-dark, #212529);
                background: white;
            }

            /* Offcanvas spacing on small screens */
            @media (max-width: 480px) {
                .offcanvas-body {
                    padding: 1rem;
                }
            }

            @media (max-width: 360px) {
                .offcanvas-body {
                    padding: 0.75rem;
                }
                .vehicle-specs {
                    gap: 0.4rem;
                }
                .spec-item {
                    padding: 0.5rem 0.25rem;
                    font-size: 0.75rem;
                }
                .vehicle-title {
                    font-size: 1.1rem;
                }
            }

            /* --- PREMIUM MOBILE REDESIGN --- */
            @media (max-width: 768px) {
                /* Search pill layout */
                .main-content-header {
                    background: white;
                    padding: 0.4rem 0.4rem 0.4rem 0.75rem;
                    border-radius: 100px;
                    box-shadow: 0 4px 25px rgba(0,0,0,0.08);
                    border: 1px solid rgba(0,0,0,0.04);
                    margin-bottom: 1.5rem;

                .search-bar-large {
                    box-shadow: none !important;
                    background: transparent;
                    padding: 0.7rem 0.75rem 0.7rem 2rem;
                    font-size: 0.95rem;
                    border-radius: 0;
                }
                .search-bar-large:focus {
                    transform: none;
                    box-shadow: none !important;
                }
                .search-icon {
                    left: 0.6rem;
                    font-size: 1rem;
                }
                .main-content-header .btn-primary {
                    border-radius: 50%;
                    width: 40px;
                    height: 40px;
                    padding: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-shrink: 0;
                    font-size: 0.875rem;
                }
                .main-content-header .dropdown-toggle {
                    box-shadow: none !important;
                    background: #f4f7fa !important;
                    border-radius: 100px !important;
                    padding: 0.5rem 0.75rem !important;
                    height: 40px;
                    align-items: center;
                }

                /* Results bar */
                .d-flex.justify-content-between.align-items-center.mb-4 h2 {
                    font-size: 1.2rem !important;
                }

                /* Vehicle Cards ΓÇö premium overrides */
                .vehicle-card {
                    border-radius: 22px;
                    border: none;
                    box-shadow: 0 6px 28px rgba(0,0,0,0.07);
                }
                /* Touch feedback */
                .vehicle-card:active {
                    transform: scale(0.98);
                    transition: transform 0.1s ease;
                }
                .vehicle-image-container {
                    height: 220px;
                }
                /* Glassmorphic price badge ΓÇö bottom-left over image */
                .price-badge {
                    top: auto;
                    bottom: 0.875rem;
                    left: 0.875rem;
                    right: auto;
                    background: rgba(255, 255, 255, 0.72);
                    backdrop-filter: blur(14px);
                    -webkit-backdrop-filter: blur(14px);
                    color: #2C3E50;
                    font-weight: 800;
                    font-size: 1rem;
                    border: 1px solid rgba(255,255,255,0.45);
                    padding: 0.4rem 0.875rem;
                }
                /* Card body */
                .vehicle-details {
                    padding: 1.1rem 1.25rem 1.25rem;
                }
                .owner-info {
                    display: none;
                }
                .vehicle-title {
                    font-size: 1.2rem;
                    font-weight: 700;
                    letter-spacing: -0.3px;
                    margin-bottom: 0.75rem;
                    color: #1a1a2e;
                }
                .location-info {
                    display: none;
                }
                /* Horizontal spec strip */
                .vehicle-specs {
                    display: flex;
                    flex-direction: row;
                    justify-content: space-around;
                    align-items: center;

                    border-radius: 14px;

                    margin-bottom: 0;
                    gap: 0;

                .spec-item {
                    background: transparent;
                    flex-direction: row;
                    align-items: center;

                    font-weight: 600;
                    color: #2C3E50;
                    text-align: left;
                }
                .spec-icon {
                    font-size: 0.95rem;
                    color: var(--text-muted) !important;
                    margin-bottom: 0;
                }
                /* Hide visible button ΓÇö full card is the tap target */
                .book-now-btn {
                    position: absolute;
                    inset: 0;
                    opacity: 0;
                    z-index: 10;
                    border-radius: 22px;
                }
                .quick-view-btn {
                    display: none !important;
                }
            }

            /* Tiny screen spec tweaks */
            @media (max-width: 400px) {
                .spec-item {
                    font-size: 0.78rem;
                    gap: 0.25rem;
                }
                .vehicle-title {
                    font-size: 1.1rem;
                }
                .vehicle-image-container {
                    height: 195px;
                }
            }
        </style>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script>
        (function () {
            const Toast = {
                container: document.getElementById('toast-container'),

                show(message, type = 'info', title = '') {
                    if (!this.container) return;

                    let iconClass = 'mdi-information';
                    let defaultTitle = 'Info';

                    switch (type) {
                        case 'success':
                            iconClass = 'mdi-check-circle';
                            defaultTitle = 'Success';
                            break;
                        case 'error':
                            iconClass = 'mdi-alert-circle';
                            defaultTitle = 'Error';
                            break;
                        case 'warning':
                            iconClass = 'mdi-alert';
                            defaultTitle = 'Warning';
                            break;
                    }

                    if (!title) title = defaultTitle;

                    const toast = document.createElement('div');
                    toast.className = `toast-notification toast-${type}`;
                    toast.setAttribute('role', 'alert');

                    toast.innerHTML = `
                        <div class="toast-icon">
                            <i class="mdi ${iconClass}"></i>
                        </div>
                        <div class="toast-content">
                            <div class="toast-title">${title}</div>
                            <div class="toast-message">${message}</div>
                        </div>
                        <button class="toast-close" aria-label="Close">
                            <i class="mdi mdi-close" style="font-size: 1.2rem;"></i>
                        </button>
                    `;

                    const closeBtn = toast.querySelector('.toast-close');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            this.dismiss(toast);
                        });
                    }

                    this.container.appendChild(toast);

                    requestAnimationFrame(() => {
                        toast.classList.add('show');
                    });

                    const duration = type === 'error' ? 8000 : 4000;
                    setTimeout(() => {
                        this.dismiss(toast);
                    }, duration);
                },

                showWithRetry(message, type, title, retryCallback) {
                    if (!this.container) return;

                    let iconClass = 'mdi-information';
                    let defaultTitle = 'Info';

                    switch (type) {
                        case 'success':
                            iconClass = 'mdi-check-circle';
                            defaultTitle = 'Success';
                            break;
                        case 'error':
                            iconClass = 'mdi-alert-circle';
                            defaultTitle = 'Error';
                            break;
                        case 'warning':
                            iconClass = 'mdi-alert';
                            defaultTitle = 'Warning';
                            break;
                    }

                    if (!title) title = defaultTitle;

                    const toast = document.createElement('div');
                    toast.className = `toast-notification toast-${type}`;
                    toast.setAttribute('role', 'alert');

                    let retryBtn = '';
                    if (retryCallback) {
                        retryBtn = `<button class="toast-retry" aria-label="Retry">
                            <i class="mdi mdi-refresh"></i> Retry
                        </button>`;
                    }

                    toast.innerHTML = `
                        <div class="toast-icon">
                            <i class="mdi ${iconClass}"></i>
                        </div>
                        <div class="toast-content">
                            <div class="toast-title">${title}</div>
                            <div class="toast-message">${message}</div>
                        </div>
                        <button class="toast-close" aria-label="Close">
                            <i class="mdi mdi-close" style="font-size: 1.2rem;"></i>
                        </button>
                        ${retryBtn}
                    `;

                    const closeBtn = toast.querySelector('.toast-close');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            this.dismiss(toast);
                        });
                    }

                    const retryBtnEl = toast.querySelector('.toast-retry');
                    if (retryBtnEl && retryCallback) {
                        retryBtnEl.addEventListener('click', () => {
                            this.dismiss(toast);
                            retryCallback();
                        });
                    }

                    this.container.appendChild(toast);

                    requestAnimationFrame(() => {
                        toast.classList.add('show');
                    });

                    setTimeout(() => {
                        this.dismiss(toast);
                    }, type === 'error' ? 10000 : 5000);
                },

                dismiss(toast) {
                    if (!toast) return;
                    toast.classList.remove('show');
                    toast.addEventListener('transitionend', () => {
                        if (toast.parentNode) toast.parentNode.removeChild(toast);
                    });
                }
            };

            window.showToast = (msg, type, title) => Toast.show(msg, type, title);
            window.showToastWithRetry = (msg, type, title, retryCallback) => 
                Toast.showWithRetry(msg, type, title, retryCallback);

            document.addEventListener('DOMContentLoaded', function () {
                // Flash Attributes - check if variables exist before using
                

                

                

                
            });
        })();
    </script>
