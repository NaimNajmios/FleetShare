<!-- Auth Gate Modal -->
<div class="modal fade" id="authGateModal" tabindex="-1" aria-labelledby="authGateModalLabel" aria-hidden="true" th:fragment="modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 justify-content-end">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center px-5 pt-0 pb-5">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle" style="width: 80px; height: 80px;">
                        <i class="mdi mdi-lock-outline text-primary" style="font-size: 40px;"></i>
                    </div>
                </div>
                
                <h4 class="fw-bold mb-3" id="authGateModalLabel">Account Required</h4>
                
                <p class="text-muted mb-4">
                    Create a free account to book vehicles, view full details, and connect with fleet owners.
                </p>
                
                <div class="d-grid gap-3">
                    <a th:href="@{/register}" class="btn btn-primary btn-lg fw-bold rounded-pill">
                        Create Free Account
                    </a>
                    <a th:href="@{/login}" class="btn btn-outline-secondary btn-lg fw-bold rounded-pill">
                        Already have an account? Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
