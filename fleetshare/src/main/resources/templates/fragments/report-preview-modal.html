<th:block xmlns:th="http://www.w3.thymeleaf.org" th:fragment="preview-modal">
    <style>
        #previewModal .modal-dialog {
            max-width: 900px;
        }

        @media (max-width: 768px) {
            #previewModal .modal-dialog {
                max-width: calc(100% - 1rem);
                margin: 0.5rem auto;
            }
        }

        #previewModal .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0.5rem 0.5rem 0 0;
        }

        #previewModal .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }

        #previewModal .summary-badges {
            margin-bottom: 1rem;
        }

        #previewModal .summary-badges .badge {
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-height: 350px;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 0.75rem;
            border: 1px solid #e9ecef;
        }

        @media (max-width: 768px) {
            .chart-container {
                max-height: 250px;
            }
        }

        .trend-up {
            color: #10b981;
        }

        .trend-down {
            color: #ef4444;
        }

        .trend-indicator {
            font-size: 0.85rem;
            margin-left: 0.5rem;
        }

        .comparison-table th {
            background: #f8f9fa;
        }

        .comparison-table th.period-a {
            background: rgba(102, 126, 234, 0.1);
        }

        .comparison-table th.period-b {
            background: rgba(17, 153, 142, 0.1);
        }

        .comparison-table th.change-col {
            background: rgba(245, 158, 11, 0.1);
        }

        .period-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .period-badge.period-a {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .period-badge.period-b {
            background: rgba(17, 153, 142, 0.2);
            color: #11998e;
        }

        .skeleton {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-chart {
            height: 200px;
            margin-bottom: 1.5rem;
        }

        .skeleton-row {
            height: 20px;
            margin-bottom: 0.75rem;
        }

        .skeleton-title {
            height: 24px;
            width: 40%;
            margin-bottom: 1rem;
        }

        .skeleton-badge {
            height: 28px;
            width: 120px;
            display: inline-block;
            margin-right: 0.5rem;
        }
    </style>

    <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="previewModalLabel">
                        <i class="mdi mdi-table me-2"></i>Report Preview
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="loading-indicator" class="skeleton-loader">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-badge"></div>
                        </div>
                        <div class="summary-badges mb-3">
                            <div class="skeleton skeleton-badge"></div>
                            <div class="skeleton skeleton-badge"></div>
                            <div class="skeleton skeleton-badge"></div>
                        </div>
                        <div class="skeleton skeleton-chart"></div>
                        <div class="skeleton skeleton-row" style="width: 100%;"></div>
                        <div class="skeleton skeleton-row" style="width: 90%;"></div>
                        <div class="skeleton skeleton-row" style="width: 95%;"></div>
                        <div class="skeleton skeleton-row" style="width: 85%;"></div>
                        <div class="skeleton skeleton-row" style="width: 92%;"></div>
                        <p class="text-center text-muted mt-3">
                            <i class="mdi mdi-loading mdi-spin me-1"></i> Generating report...
                        </p>
                    </div>
                    <div id="preview-content" style="display: none;"></div>
                    <div class="chart-container" id="chart-container" style="display: none;">
                        <canvas id="reportChart" aria-label="Report chart visualization"></canvas>
                    </div>
                    <div id="preview-table-content" style="display: none;"></div>
                    <div id="comparison-table-content" style="display: none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="modal-btn-csv">
                        <i class="mdi mdi-file-excel me-1"></i> CSV
                    </button>
                    <button type="button" class="btn btn-primary" id="modal-btn-excel">
                        <i class="mdi mdi-microsoft-excel me-1"></i> Excel
                    </button>
                    <button type="button" class="btn-generate" id="modal-btn-pdf">
                        <i class="mdi mdi-file-pdf-box me-1"></i> Download PDF
                    </button>
                </div>
            </div>
        </div>
    </div>
</th:block>
