<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="${pageTitle} + ' - FleetShare'">FleetShare</title>
    <!-- Font Awesome 6 for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom padding override -->
    <style>
        body[data-role="renter"] .content-wrapper {
            padding: 1rem 0.5rem;
        }
        body[data-role="renter"] .navbar-brand-wrapper {
            padding-left: 0.5rem;
            width: 200px;
        }
        body[data-role="renter"] .navbar-brand-wrapper .navbar-brand {
            font-size: 1.25rem;
        }
        body[data-role="renter"] .navbar-menu-wrapper {
            padding-right: 0.5rem;
        }
    </style>
    <!-- plugins:css -->
    <link rel="stylesheet" th:href="@{/assets/vendors/feather/feather.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/ti-icons/css/themify-icons.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/font-awesome/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
    <!-- endinject -->
    <!-- Plugin css for this page -->
    <link rel="stylesheet" th:href="@{/assets/vendors/datatables.net-bs5/dataTables.bootstrap5.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/ti-icons/css/themify-icons.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/assets/js/select.dataTables.min.css}">
    <!-- End plugin css for this page -->
    <!-- inject:css -->
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/fleetshare-design-system.css}">
    <!-- endinject -->
    <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />

    <!-- Extra CSS fragment -->
    <th:block layout:fragment="extra-css"></th:block>
</head>

<body data-role="renter">
    <script>
        if (localStorage.getItem('sidebarState') === 'collapsed') {
            document.body.classList.add('sidebar-icon-only');
        }
    </script>
    <div class="container-scroller">
        <!-- partial:fragments/renter-nav.html -->
        <div th:replace="~{fragments/renter-nav :: navbar}"></div>
        <!-- partial -->
        <div class="container-fluid page-body-wrapper">
            <!-- partial:fragments/renter-sidebar.html -->
            <div th:replace="~{fragments/renter-sidebar :: sidebar}"></div>
            <!-- partial -->
            <div class="main-panel">
                <div class="content-wrapper">
                    <!-- Toast Notifications -->
                    <div th:replace="~{fragments/toast :: toast}"></div>
                    <!-- Main Content -->
                    <div layout:fragment="content">
                        <!-- Default content can go here -->
                    </div>
                </div>
                <!-- content-wrapper ends -->
            </div>
            <!-- main-panel ends -->
        </div>
        <!-- page-body-wrapper ends -->
    </div>
    <!-- container-scroller -->

    <!-- Reusable Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalTitle">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="confirmModalPreview" class="mb-3 text-center" style="display: none;"></div>
                    <p id="confirmModalMessage" class="mb-0">Are you sure you want to proceed?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmModalBtn">Confirm</button>
                </div>
            </div>
        </div>
    </div>
    <!-- plugins:js -->
    <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page -->
    <script th:src="@{/assets/vendors/chart.js/chart.umd.js}"></script>
    <script th:src="@{/assets/vendors/datatables.net/jquery.dataTables.js}"></script>
    <script th:src="@{/assets/vendors/datatables.net-bs5/dataTables.bootstrap5.js}"></script>
    <script th:src="@{/assets/js/dataTables.select.min.js}"></script>
    <!-- End plugin js for this page -->
    <!-- inject:js -->
    <script th:src="@{/assets/js/off-canvas.js}"></script>
    <script th:src="@{/assets/js/template.js}"></script>
    <script th:src="@{/assets/js/settings.js}"></script>
    <script th:src="@{/assets/js/todolist.js}"></script>
    <script th:src="@{/assets/js/search.js}"></script>
    <!-- endinject -->
    <!-- Custom js for this page-->
    <script th:src="@{/assets/js/jquery.cookie.js}" type="text/javascript"></script>
    <script th:src="@{/assets/js/dashboard.js}"></script>
    <!-- End custom js for this page-->

    <!-- Extra JS fragment -->
    <th:block layout:fragment="extra-js"></th:block>
</body>

</html>
