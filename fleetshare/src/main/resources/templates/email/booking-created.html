<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .header { background-color: #28a745; color: #fff; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; }
        h1 { margin: 0; font-size: 24px; }
        .content { margin-top: 20px; font-size: 16px; line-height: 1.5; color: #333; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Booking Initialized</h1>
        </div>
        <div class="content">
            <p>Hi <strong th:text="${userName}">User</strong>,</p>
            <p>A new booking request has been initialized (Booking ID: #<span th:text="${bookingId}">0</span>).</p>
            <p><strong>Booking Details:</strong></p>
            <table>
                <tr>
                    <th>Vehicle</th>
                    <td th:text="${vehicleDetails}">Car Name</td>
                </tr>
                <tr>
                    <th>Start Date</th>
                    <td th:text="${#temporals.format(startDate, 'dd MMM yyyy')}">01 Jan 2026</td>
                </tr>
                <tr>
                    <th>End Date</th>
                    <td th:text="${#temporals.format(endDate, 'dd MMM yyyy')}">05 Jan 2026</td>
                </tr>
            </table>
            <p>Please log in to your dashboard to view the full details.</p>
        </div>
        <div class="footer">
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> FleetShare. All Rights Reserved.
        </div>
    </div>
</body>
</html>
