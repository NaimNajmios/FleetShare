<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Receipt Uploaded</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .header { background-color: #ffc107; color: #333; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; }
        h1 { margin: 0; font-size: 24px; }
        .content { margin-top: 20px; font-size: 16px; line-height: 1.5; color: #333; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Action Required: Receipt Uploaded</h1>
        </div>
        <div class="content">
            <p>Hi <strong th:text="${ownerName}">Owner</strong>,</p>
            <p>A renter has uploaded a bank transfer receipt for Booking ID: #<span th:text="${bookingId}">0</span>.</p>
            <p>Please log in to your fleet owner dashboard to verify the payment receipt and update the payment status.</p>
        </div>
        <div class="footer">
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> FleetShare. All Rights Reserved.
        </div>
    </div>
</body>
</html>
