<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login - FleetShare</title>

    <!-- Vendor CSS -->
    <link rel="stylesheet" href="/assets/vendors/mdi/css/materialdesignicons.min.css">

    <!-- Custom Auth CSS -->
    <link rel="stylesheet" href="/css/auth.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body class="auth-page">
    <div class="auth-bg-decoration">
        <div class="auth-bg-circle auth-bg-circle-1"></div>
        <div class="auth-bg-circle auth-bg-circle-2"></div>
        <div class="auth-bg-circle auth-bg-circle-3"></div>
    </div>
    
    <div class="auth-noise-overlay"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <button type="button" id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">
                <i class="mdi mdi-weather-night"></i>
            </button>

            <!-- Brand Logo -->
            <div class="auth-brand">
                <div class="auth-brand-logo">
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="44" height="44" rx="12" fill="url(#logoBgGradient)"/>
                        <path d="M10 28V20C10 18.8954 10.8954 18 12 18H20L24 22H32C33.1046 22 34 22.8954 34 24V28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="16" cy="30" r="3" stroke="white" stroke-width="2.5"/>
                        <circle cx="28" cy="30" r="3" stroke="white" stroke-width="2.5"/>
                        <path d="M10 24H8C7.44772 24 7 24.4477 7 25V27C7 27.5523 7.44772 28 8 28H10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="logoBgGradient" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#2563eb"/>
                                <stop offset="1" stop-color="#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="brand-text">
                        <span class="brand-fleet">Fleet</span><span class="brand-share">Share</span>
                    </span>
                </div>
            </div>

            <!-- Header -->
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">
                    <i class="mdi mdi-lock-open-outline label-icon"></i>
                    Sign in to access your fleet dashboard
                </p>
            </div>

            <!-- Error Messages -->
            <div th:if="${param.error}" class="form-error mb-4" role="alert">
                <i class="mdi mdi-alert-circle" aria-hidden="true"></i>
                <span>Invalid email or password. Please try again.</span>
            </div>
            <div th:if="${param.logout}" class="form-success mb-4" role="status">
                <i class="mdi mdi-check-circle" aria-hidden="true"></i>
                <span>You have been logged out successfully.</span>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" th:action="@{/login}" method="post">
                <!-- Email -->
                <div class="form-group animate-field" style="--delay: 0ms">
                    <label class="form-label" for="username">
                        <i class="mdi mdi-email-outline label-icon"></i>
                        Email Address
                    </label>
                    <input type="text" class="form-input" id="username" name="username" placeholder="you@example.com"
                        required autocomplete="username">
                </div>

                <!-- Password -->
                <div class="form-group animate-field" style="--delay: 80ms">
                    <label class="form-label" for="password">
                        <i class="mdi mdi-lock-outline label-icon"></i>
                        Password
                    </label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input form-input-with-icon" id="password" name="password"
                            placeholder="Enter your password" required autocomplete="current-password">
                        <i class="mdi mdi-eye-off-outline input-icon-right" id="togglePassword" role="button"
                           aria-label="Show password" tabindex="0"></i>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password Row -->
                <div class="form-row-group animate-field" style="--delay: 160ms">
                    <div class="form-toggle-wrapper">
                        <input type="checkbox" class="form-toggle" id="remember-me" name="remember-me">
                        <label class="form-toggle-label" for="remember-me">
                            <span class="toggle-slider"></span>
                            <span class="toggle-text">Keep me signed in</span>
                        </label>
                    </div>
                    <a href="#" class="auth-link forgot-password-link">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <div class="form-group mb-0 animate-field" style="--delay: 240ms">
                    <button type="submit" class="btn btn-primary" id="loginButton">
                        <span class="btn-text">
                            <i class="mdi mdi-login"></i>
                            Sign In
                        </span>
                        <span class="btn-loader d-none">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                            Signing in...
                        </span>
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="auth-footer animate-field" style="--delay: 320ms">
                <p class="auth-footer-text">
                    Don't have an account?
                    <a href="/register" class="auth-link auth-link-cta">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.querySelector('#togglePassword');
            const password = document.querySelector('#password');

            if (togglePassword && password) {
                togglePassword.addEventListener('click', function (e) {
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    this.classList.toggle('mdi-eye-outline');
                    this.classList.toggle('mdi-eye-off-outline');
                    this.setAttribute('aria-label', type === 'password' ? 'Show password' : 'Hide password');
                });

                togglePassword.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            }

            const loginForm = document.getElementById('loginForm');
            const loginButton = document.getElementById('loginButton');

            if (loginForm && loginButton) {
                loginForm.addEventListener('submit', function() {
                    if (loginForm.checkValidity()) {
                        loginButton.classList.add('btn-loading');
                        loginButton.disabled = true;
                        const btnText = loginButton.querySelector('.btn-text');
                        const btnLoader = loginButton.querySelector('.btn-loader');
                        if (btnText) btnText.classList.add('d-none');
                        if (btnLoader) btnLoader.classList.remove('d-none');
                    }
                });
            }

            // Theme Toggle Logic
            const themeToggleBtn = document.getElementById('themeToggle');
            if (themeToggleBtn) {
                const themeIcon = themeToggleBtn.querySelector('i');
                
                if (document.documentElement.getAttribute('data-theme') === 'dark') {
                    themeIcon.classList.remove('mdi-weather-night');
                    themeIcon.classList.add('mdi-weather-sunny');
                }

                themeToggleBtn.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    if (currentTheme === 'dark') {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        themeIcon.classList.remove('mdi-weather-sunny');
                        themeIcon.classList.add('mdi-weather-night');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        themeIcon.classList.remove('mdi-weather-night');
                        themeIcon.classList.add('mdi-weather-sunny');
                    }
                });
            }
        });
    </script>
</body>

</html>
