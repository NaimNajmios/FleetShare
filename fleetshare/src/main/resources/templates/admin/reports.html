<!DOCTYPE html>
<html xmlns:th="http://www.w3.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/admin-layout}" th:with="activePage='reports', pageTitle='Standard Report Builder'">

<head>
    <th:block layout:fragment="extra-css">
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <div>
                        <h3 class="font-weight-bold mb-1">Platform Report Builder</h3>
                        <p class="text-muted mb-0">Generate platform-wide structured reports</p>
                    </div>
                    <a th:href="@{/admin/ai-reports}" class="btn btn-outline-primary">
                        <i class="mdi mdi-robot me-1"></i> Try AI Data Assistant
                    </a>
                </div>
            </div>
        </div>

        <th:block th:replace="~{fragments/report-category-cards :: category-cards('booking')}"></th:block>

        <div class="row">
            <div class="col-lg-4 mb-4 mb-lg-0">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Report Templates</h5>
                        <th:block th:replace="~{fragments/report-type-list :: type-list}"></th:block>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Report Configuration</h5>
                        <th:block th:replace="~{fragments/report-config-section :: config-section('admin', null, ${fleetOwners}, true)}"></th:block>
                    </div>
                </div>
            </div>
        </div>

        <th:block th:replace="~{fragments/report-preview-modal :: preview-modal}"></th:block>
    </div>

    <th:block layout:fragment="extra-js">
        <script th:src="@{/js/report-config.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                ReportBuilder.init('/admin/reports');
            });
        </script>
    </th:block>
</body>

</html>
