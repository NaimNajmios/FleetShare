# ============================================
# FleetShare - Production Configuration
# ============================================

# --- Database (Railway MySQL) ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=${PORT:8080}

# --- File Uploads ---
# Railway uses ephemeral storage. Use /app/uploads for container-local storage.
# For persistent storage, integrate a cloud provider (see Section 6).
app.upload.dir=/app/uploads
app.upload.vehicle-images=${app.upload.dir}/vehicles
app.upload.profile-images=${app.upload.dir}/profiles
app.upload.payment-proofs=${app.upload.dir}/payments
app.upload.qr-codes=${app.upload.dir}/qrcodes

# --- Base URL (set via Railway environment variable) ---
app.base-url=${APP_BASE_URL:https://your-app.up.railway.app}

# --- Email ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}

# --- AI Assistant ---
ai.assistant.provider=${AI_PROVIDER:groq}
ai.assistant.groq.api-key=${GROQ_API_KEY:}
ai.assistant.groq.model=llama-3.3-70b-versatile
ai.assistant.groq.url=https://api.groq.com/openai/v1/chat/completions
ai.assistant.cerebras.api-key=${CEREBRAS_API_KEY:}
ai.assistant.cerebras.model=llama-3.3-70b
ai.assistant.cerebras.url=https://api.cerebras.ai/v1/chat/completions
ai.assistant.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.assistant.openrouter.model=meta-llama/llama-3.3-70b-instruct:free
ai.assistant.openrouter.url=https://openrouter.ai/api/v1/chat/completions
ai.assistant.max-data-rows=50

# --- ToyyibPay ---
toyyibpay.api.base-url=https://toyyibpay.com
toyyibpay.bill.expiry-days=3
toyyibpay.bill.payment-channel=2
toyyibpay.platform.secret-key=${TOYYIBPAY_PLATFORM_SECRET_KEY:}
toyyibpay.platform.category-code=${TOYYIBPAY_PLATFORM_CATEGORY_CODE:}
toyyibpay.platform.username=${TOYYIBPAY_PLATFORM_USERNAME:}

# --- Commission ---
fleetshare.commission.rate=0.10
fleetshare.commission.enabled=true

# --- Error Handling ---
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# --- Logging ---
logging.level.com.najmi.fleetshare=WARN

# --- Disable .env import in production (use Railway env vars) ---
spring.config.import=optional:classpath:.env[.properties]
